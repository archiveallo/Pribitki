<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Село — Цифрова Спадщина</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,700&family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #e9dcc0; overflow-x: hidden; }

        /* Фон старого паперу */
        .parchment {
            background: #e9dcc0 url('https://www.transparenttextures.com/patterns/parchment.png');
            min-height: 100vh;
            position: relative;
        }

        .village-title { font-family: 'Great Vibes', cursive; color: #2D1B0D; text-shadow: 2px 2px 0px rgba(255,255,255,0.3); }
        .handwritten { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; }

        /* Кнопки-предмети */
        .object-btn {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.2));
            text-align: center;
        }
        .object-btn:hover {
            transform: translateY(-15px) scale(1.05);
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.3));
        }
        .object-btn:active { transform: scale(0.95); }

        .object-label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: #2D1B0D;
            margin-top: 10px;
            display: block;
        }

        /* Оверлеї (вікна) */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(10, 47, 31, 0.96);
            backdrop-filter: blur(15px);
            display: none;
            overflow-y: auto;
            color: #F5EED8;
        }
        .modal-overlay.active { display: block; }

        .close-btn { position: fixed; top: 30px; right: 40px; font-size: 3rem; color: #D4A017; z-index: 110; }

        /* Кастомні тіні для фото */
        .photo-frame { border: 10px solid white; border-bottom: 40px solid white; box-shadow: 5px 10px 30px rgba(0,0,0,0.3); transform: rotate(-2deg); }
    </style>
</head>
<body x-data="villageApp()" class="parchment">

    <!-- 1. ГЕРОЙ-ФОТО (Як на вашому макеті) -->
    <header class="h-[55vh] relative shadow-2xl">
        <img :src="village.img" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-[#e9dcc0] via-transparent to-transparent"></div>
        <a href="index.html" class="absolute top-6 left-6 bg-black/30 text-white px-5 py-2 rounded-full font-bold text-xs uppercase backdrop-blur-md hover:bg-black/50 transition-all">← Назад</a>
    </header>

    <!-- 2. ГОЛОВНИЙ ІНТЕРФЕЙС -->
    <main class="max-w-6xl mx-auto text-center px-6 -mt-12 relative z-10">
        <h1 class="text-7xl md:text-[9rem] village-title mb-2" x-text="village.name"></h1>
        <p class="handwritten text-2xl md:text-4xl text-[#4A3728] mb-20" x-text="village.sub"></p>

        <!-- ПРЕДМЕТИ-КНОПКИ -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-12 md:gap-16">
            
            <!-- Історія (Книга) -->
            <div class="object-btn" @click="activeTab = 'history'">
                <img src="https://cdn-icons-png.flaticon.com/512/3389/3389081.png" class="w-32 md:w-48 mx-auto">
                <span class="object-label">Історія</span>
            </div>

            <!-- Фото (Галерея) -->
            <div class="object-btn" @click="activeTab = 'gallery'">
                <img src="https://cdn-icons-png.flaticon.com/512/833/833281.png" class="w-32 md:w-48 mx-auto">
                <span class="object-label">Фотогалерея</span>
            </div>

            <!-- Архів (Портфель) -->
            <div class="object-btn" @click="activeTab = 'archive'">
                <img src="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" class="w-32 md:w-48 mx-auto">
                <span class="object-label">Архів</span>
            </div>

            <!-- Відео (Плівка) -->
            <div class="object-btn" @click="activeTab = 'video'">
                <img src="https://cdn-icons-png.flaticon.com/512/4221/4221419.png" class="w-32 md:w-48 mx-auto">
                <span class="object-label">Відео</span>
            </div>

        </div>

        <!-- КНОПКИ ДЛЯ БЛОГУ ТА 3D -->
        <div class="mt-24 flex flex-wrap justify-center gap-8 pb-20">
            <button @click="activeTab = 'blog'" class="px-10 py-3 border-2 border-[#4A3728]/30 rounded-full font-bold uppercase text-xs tracking-widest hover:border-[#D4A017] hover:text-[#D4A017] transition-all">📝 Блог села</button>
            <button @click="activeTab = 'vr'" class="px-10 py-3 border-2 border-[#4A3728]/30 rounded-full font-bold uppercase text-xs tracking-widest hover:border-[#D4A017] hover:text-[#D4A017] transition-all">🌐 3D Панорама</button>
        </div>
    </main>

    <!-- МОДАЛЬНІ ВІКНА -->

    <!-- Історія -->
    <div class="modal-overlay" :class="activeTab === 'history' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-4xl mx-auto py-32 px-10">
            <h2 class="text-6xl font-serif text-gold-accent mb-12 italic text-center">Літопис села</h2>
            <div class="bg-white/5 p-12 rounded-[3rem] text-2xl md:text-3xl leading-relaxed font-light text-gray-200" x-text="village.history"></div>
        </div>
    </div>

    <!-- Фотогалерея -->
    <div class="modal-overlay" :class="activeTab === 'gallery' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-7xl mx-auto py-32 px-10">
            <h2 class="text-6xl font-serif text-center mb-20 text-gold-accent">Світлини Пам'яті</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">
                <template x-for="p in photos">
                    <div class="photo-frame bg-white p-2">
                        <img :src="p.url" class="w-full h-80 object-cover">
                        <p class="mt-4 text-black font-serif italic text-center" x-text="p.caption"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Відео -->
    <div class="modal-overlay" :class="activeTab === 'video' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-6xl mx-auto py-32 px-10">
            <h2 class="text-6xl font-serif text-center mb-20 text-gold-accent">Відео-архів</h2>
            <div class="grid md:grid-cols-2 gap-10">
                <template x-for="v in videos">
                    <div class="rounded-3xl overflow-hidden border border-white/10 aspect-video shadow-2xl">
                        <iframe class="w-full h-full" :src="'https://www.youtube.com/embed/' + v.ytId" frameborder="0" allowfullscreen></iframe>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function villageApp() {
            return {
                villageId: new URLSearchParams(window.location.search).get('v') || 'prybytky',
                activeTab: '',
                village: { name: 'Завантаження...', sub: '', history: '', img: '' },
                photos: [],
                videos: [],

                init() {
                    const localData = {
                        'prybytky': { name: 'Прибитки', sub: 'Фото. Відео. Історія. Архівні документи.', img: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1200', history: 'Тут починається наш рід. Село Прибитки — це не просто точка на карті, а колиска традицій...' },
                        'sorokopen': { name: 'Сорокопень', sub: 'Край Кряжу та легенд', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1200', history: 'На висоті Словечансько-Овруцького кряжу розкинулося наше село...' }
                    };
                    this.village = localData[this.villageId] || localData['prybytky'];

                    // Firebase Sync
                    db.collection('village_photos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.photos = s.docs.map(d => d.data());
                    });
                    db.collection('village_videos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.videos = s.docs.map(d => d.data());
                    });
                }
            }
        }

        window.addEventListener('load', () => {
            gsap.from(".object-btn", { y: 80, opacity: 0, duration: 1, stagger: 0.15, ease: "power4.out" });
        });
    </script>
</body>
</html>
