<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Село — Цифрова Спадщина</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,700&family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #061A12; overflow-x: hidden; }

        /* Текстура старого паперу */
        .parchment-bg {
            background: #e9dcc0 url('https://www.transparenttextures.com/patterns/parchment.png');
            box-shadow: inset 0 0 150px rgba(0,0,0,0.3);
            border-radius: 4rem 4rem 0 0;
            position: relative;
            z-index: 20;
            margin-top: -80px;
            min-height: 100vh;
        }

        .village-title { font-family: 'Great Vibes', cursive; color: #2D1B0D; line-height: 1; }
        .sub-title { font-family: 'Cormorant Garamond', serif; color: #4A3728; font-style: italic; }

        /* Стиль кнопок-предметів */
        .object-btn {
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.25));
            position: relative;
        }
        .object-btn:hover {
            transform: translateY(-20px) scale(1.05);
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.4));
        }
        .object-btn:active { transform: scale(0.95); }

        .object-label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #2D1B0D;
            margin-top: 10px;
            display: block;
        }

        /* Оверлей для контенту */
        .content-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(6, 26, 18, 0.98);
            backdrop-filter: blur(25px);
            display: none;
            overflow-y: auto;
            color: #E2E8F0;
        }
        .content-overlay.active { display: block; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Кастомний скрол */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #D4A017; border-radius: 10px; }
    </style>
</head>
<body x-data="villageApp()">

    <!-- ГЕРОЙ-ФОТО (Верхня частина) -->
    <header class="h-[70vh] relative">
        <img :src="village.img" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-[#e9dcc0] via-transparent to-transparent"></div>
        <a href="index.html" class="absolute top-10 left-10 bg-black/20 backdrop-blur-md px-6 py-2 rounded-full text-white font-bold uppercase text-xs tracking-widest hover:bg-black/40 transition-all">← Громада</a>
    </header>

    <!-- ПЕРГАМЕНТНА ПАНЕЛЬ (Інтерфейс) -->
    <main class="parchment-bg px-6 pb-40">
        <div class="max-w-6xl mx-auto text-center pt-20">
            <h1 class="text-8xl md:text-[10rem] village-title mb-4" x-text="village.name"></h1>
            <p class="sub-title text-2xl md:text-4xl mb-24" x-text="village.sub"></p>

            <!-- ГРІД ПРЕДМЕТІВ -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-16 md:gap-24 px-4">
                
                <!-- ІСТОРІЯ (Книга) -->
                <div class="object-btn group" @click="openSection('history')">
                    <img src="https://i.ibb.co/LST600m/book-old.png" class="w-full max-w-[280px] mx-auto" alt="Історія">
                    <span class="object-label">📜 Наша Історія</span>
                </div>

                <!-- ФОТО (Стопка фото) -->
                <div class="object-btn" @click="openSection('gallery')">
                    <img src="https://i.ibb.co/D7z6XzM/photo-stack.png" class="w-full max-w-[280px] mx-auto" alt="Фото">
                    <span class="object-label">🖼️ Фотогалерея</span>
                </div>

                <!-- АРХІВ (Портфель) -->
                <div class="object-btn" @click="openSection('archive')">
                    <img src="https://i.ibb.co/m0L8vC4/briefcase.png" class="w-full max-w-[280px] mx-auto" alt="Архів">
                    <span class="object-label">💼 Архівні документи</span>
                </div>

                <!-- ВІДЕО (Плівка) -->
                <div class="object-btn" @click="openSection('video')">
                    <img src="https://i.ibb.co/3pX6X3z/film-strip.png" class="w-full max-w-[280px] mx-auto" alt="Відео">
                    <span class="object-label">🎬 Відео-хроніка</span>
                </div>

            </div>

            <!-- ДОДАТКОВІ КНОПКИ (Блог та 3D) -->
            <div class="flex justify-center gap-12 mt-32">
                <button @click="openSection('blog')" class="sub-title text-2xl border-b-2 border-[#4A3728]/30 hover:border-[#D4A017] transition-all">📝 Блог села</button>
                <button @click="openSection('vr')" class="sub-title text-2xl border-b-2 border-[#4A3728]/30 hover:border-[#D4A017] transition-all">🌐 3D Панорама</button>
            </div>
        </div>
    </main>

    <!-- ВІКНА КОНТЕНТУ (MODALS) -->
    
    <!-- Секція: Історія -->
    <div class="content-overlay" :class="activeSection === 'history' ? 'active' : ''">
        <button @click="activeSection = ''" class="fixed top-10 right-10 text-5xl text-gold-accent hover:rotate-90 transition-all z-[110]">&times;</button>
        <div class="max-w-4xl mx-auto py-32 px-6">
            <h2 class="text-6xl font-serif text-gold-accent mb-12 italic text-center">Літопис села</h2>
            <div class="glass-card p-10 md:p-20 rounded-[3rem] text-xl md:text-3xl leading-relaxed font-light" x-text="village.history"></div>
        </div>
    </div>

    <!-- Секція: Галерея -->
    <div class="content-overlay" :class="activeSection === 'gallery' ? 'active' : ''">
        <button @click="activeSection = ''" class="fixed top-10 right-10 text-5xl text-gold-accent z-[110]">&times;</button>
        <div class="max-w-7xl mx-auto py-32 px-6">
            <h2 class="text-6xl font-serif text-center mb-20">Світлини Пам'яті</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="p in photos">
                    <div class="aspect-square rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                        <img :src="p.url" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Секція: Відео -->
    <div class="content-overlay" :class="activeSection === 'video' ? 'active' : ''">
        <button @click="activeSection = ''" class="fixed top-10 right-10 text-5xl text-gold-accent z-[110]">&times;</button>
        <div class="max-w-6xl mx-auto py-32 px-6">
            <h2 class="text-6xl font-serif text-center mb-20">Відео-хроніка</h2>
            <div class="grid md:grid-cols-2 gap-10">
                <template x-for="v in videos">
                    <div class="rounded-3xl overflow-hidden border border-white/10 aspect-video shadow-2xl">
                        <iframe class="w-full h-full" :src="'https://www.youtube.com/embed/' + v.ytId" frameborder="0" allowfullscreen></iframe>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function villageApp() {
            return {
                villageId: new URLSearchParams(window.location.search).get('v') || 'prybytky',
                activeSection: '',
                village: { name: 'Завантаження...', sub: '', history: '', img: '' },
                photos: [],
                videos: [],

                init() {
                    const data = {
                        'prybytky': { name: 'Прибитки', sub: 'Фото. Відео. Історія. Архівні документи.', img: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1200', history: 'Тут починається наш рід. Село Прибитки — це не просто точка на карті, а колиска традицій...' },
                        'sorokopen': { name: 'Сорокопень', sub: 'Край Кряжу та легенд', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1200', history: 'На висоті Словечансько-Овруцького кряжу розкинулося наше село...' }
                    };
                    this.village = data[this.villageId] || data['prybytky'];

                    // Завантаження фото
                    db.collection('village_photos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.photos = s.docs.map(d => d.data());
                    });

                    // Завантаження відео
                    db.collection('village_videos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.videos = s.docs.map(d => d.data());
                    });
                },

                openSection(name) {
                    this.activeSection = name;
                    document.body.style.overflow = 'hidden';
                }
            }
        }

        // Анімація предметів при появі
        window.addEventListener('load', () => {
            gsap.from(".object-btn", { 
                y: 150, opacity: 0, duration: 1.2, stagger: 0.2, ease: "power4.out" 
            });
        });
    </script>
</body>
</html>
