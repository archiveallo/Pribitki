<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Село — Спадщина Полісся</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'forest-dark': '#0A2F1F',
                        'forest-deep': '#061A12',
                        'gold-accent': '#D4A017',
                        'mist': 'rgba(255, 255, 255, 0.05)',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #061A12; color: #E2E8F0; overflow-x: hidden; }
        .noise-bg { position: fixed; inset: 0; z-index: 50; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .glass-card { background: rgba(17, 45, 34, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(212, 160, 23, 0.1); }
        .text-glow { text-shadow: 0 0 20px rgba(212, 160, 23, 0.3); }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #061A12; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4A017; border-radius: 10px; }

        /* Drag-to-scroll ribbons */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .video-card {
            flex: 0 0 280px;
            aspect-ratio: 9/16;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .lightbox-bg { background: rgba(6, 26, 18, 0.98); backdrop-filter: blur(20px); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="villageApp()" class="font-sans antialiased custom-scrollbar">

    <div class="noise-bg"></div>

    <!-- LIGHTBOX (Відкриття фото на весь екран) -->
    <div x-show="lightbox.open" 
         x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-90"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         class="fixed inset-0 z-[1000] lightbox-bg flex items-center justify-center p-4"
         @click.self="lightbox.open = false"
         @keydown.escape.window="lightbox.open = false">
        
        <button @click="lightbox.open = false" class="absolute top-8 right-8 text-gold-accent hover:rotate-90 transition-transform duration-500 z-[1001]">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <img :src="lightbox.img" class="max-h-[90vh] max-w-full rounded-xl shadow-2xl border border-gold-accent/20">
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] px-6 py-4" id="main-nav">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-card px-8 py-3 rounded-full">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gold-accent rounded-full flex items-center justify-center text-forest-deep font-bold text-xs">МС</div>
                <span class="text-xl font-serif font-bold text-gold-accent tracking-tighter uppercase">Моє Село</span>
            </a>
            
            <div x-show="$store.auth.user" class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-bold text-gold-accent uppercase" x-text="$store.auth.isAdmin ? 'Адміністратор' : 'Громада'"></p>
                    <p class="text-[9px] text-gray-400" x-text="$store.auth.user.displayName"></p>
                </div>
                <img :src="$store.auth.user.photoURL" class="w-10 h-10 rounded-full border border-gold-accent shadow-lg">
            </div>
        </div>
    </nav>

    <!-- Hero Section: Головне фото та історія -->
    <section class="relative min-h-screen flex items-center justify-center pt-32 pb-20 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img :src="village.heroImage" class="w-full h-full object-cover opacity-40 scale-105 parallax-bg" alt="Village Background">
            <div class="absolute inset-0 bg-gradient-to-b from-forest-deep/0 via-forest-deep/80 to-forest-deep"></div>
        </div>

        <div class="relative z-10 max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-9xl font-serif font-bold text-white text-glow mb-12 tracking-tighter" x-text="village.name">Село</h1>
            
            <!-- Картка історії -->
            <div class="glass-card p-8 md:p-16 rounded-[40px] text-left relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-gold-accent"></div>
                
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-serif italic text-gold-accent">Наше Коріння</h2>
                    <template x-if="$store.auth.isAdmin">
                        <button @click="saveHistory()" class="bg-gold-accent text-forest-deep px-6 py-2 rounded-full font-bold text-xs uppercase hover:scale-105 transition">Зберегти зміни</button>
                    </template>
                </div>

                <div class="text-lg md:text-2xl text-gray-200 leading-relaxed font-light" 
                     :contenteditable="$store.auth.isAdmin" 
                     id="history-text"
                     x-text="village.history">
                </div>
            </div>
        </div>
    </section>

    <!-- Photo Gallery: Горизонтальна стрічка -->
    <section class="py-32 bg-forest-dark/30">
        <div class="max-w-7xl mx-auto px-6 mb-16 flex justify-between items-end">
            <div>
                <h2 class="text-4xl md:text-5xl font-serif text-white mb-4">Світлини Пам'яті</h2>
                <div class="w-24 h-1 bg-gold-accent"></div>
            </div>
            <p class="text-gray-500 italic text-sm hidden md:block">Гортайте вбік, щоб побачити більше →</p>
        </div>

        <div class="hide-scrollbar flex gap-8 overflow-x-auto px-[5%] pb-12 cursor-grab active:cursor-grabbing" id="gallery-ribbon">
            <template x-for="(img, index) in village.gallery" :key="index">
                <div class="flex-none w-[300px] md:w-[500px] h-[400px] md:h-[600px] rounded-[32px] overflow-hidden glass-card p-2 group relative cursor-pointer"
                     @click="openLightbox(img)">
                    <img :src="img" class="w-full h-full object-cover rounded-[24px] transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-forest-deep/20 group-hover:bg-transparent transition-colors duration-500"></div>
                    <div class="absolute bottom-8 left-8 opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="w-12 h-12 rounded-full bg-gold-accent flex items-center justify-center text-forest-deep">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" stroke-width="2"></path></svg>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <!-- Video Reels: Вертикальна стрічка -->
    <section class="py-32 bg-forest-deep">
        <div class="max-w-7xl mx-auto px-6 mb-16 text-center">
            <h2 class="text-4xl md:text-5xl font-serif text-white mb-4">Життя в Русі</h2>
            <p class="text-gold-accent uppercase tracking-widest text-xs font-bold opacity-60">Відео-хроніки нашої громади</p>
        </div>

        <div class="hide-scrollbar flex gap-6 overflow-x-auto px-[5%] pb-10">
            <template x-for="(vid, index) in village.videos" :key="index">
                <div class="video-card glass-card p-1">
                    <video loop muted playsinline @mouseover="$el.play()" @mouseleave="$el.pause()" class="w-full h-full object-cover rounded-[20px]">
                        <source :src="vid" type="video/mp4">
                    </video>
                    <div class="absolute bottom-6 left-6 flex items-center gap-2 pointer-events-none">
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-white/70">Live Polissya</span>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 border-t border-mist text-center relative overflow-hidden">
        <a href="index.html" class="inline-flex items-center gap-4 text-gold-accent group">
            <span class="w-10 h-10 border border-gold-accent rounded-full flex items-center justify-center group-hover:bg-gold-accent group-hover:text-forest-deep transition-all">←</span>
            <span class="font-serif italic text-xl">Повернутися до громади</span>
        </a>
    </footer>

    <script>
        // 1. Firebase Configuration (ЗАМІНИ НА СВОЇ КЛЮЧІ)
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. Alpine.js Application Logic
        function villageApp() {
            return {
                villageId: new URLSearchParams(window.location.search).get('v') || 'prybytky',
                village: {
                    name: 'Завантаження...',
                    history: 'Пошук літописів у архівах громади...',
                    heroImage: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e',
                    gallery: [],
                    videos: []
                },
                lightbox: { open: false, img: '' },

                init() {
                    // Auth state
                    auth.onAuthStateChanged(user => {
                        Alpine.store('auth', {
                            user: user,
                            isAdmin: user && user.email === 'restend88@gmail.com'
                        });
                    });

                    // Fetch Data
                    db.collection('villages').doc(this.villageId).onSnapshot(doc => {
                        if (doc.exists) {
                            this.village = doc.data();
                        } else {
                            // Дані-заглушки, якщо бази ще немає
                            this.village = {
                                name: 'Прибитки',
                                history: 'Тут бере початок наша історія. Між прадавніми лісами та Кряжем...',
                                heroImage: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef',
                                gallery: [
                                    'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b',
                                    'https://images.unsplash.com/photo-1473448912268-2022ce9509d8',
                                    'https://images.unsplash.com/photo-1414438992182-69e404046f80'
                                ],
                                videos: [
                                    'https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4',
                                    'https://assets.mixkit.co/videos/preview/mixkit-sunlight-shining-through-the-leaves-of-a-tree-534-large.mp4'
                                ]
                            };
                        }
                    });

                    this.initDragScroll();
                },

                openLightbox(img) {
                    this.lightbox.img = img;
                    this.lightbox.open = true;
                    document.body.style.overflow = 'hidden';
                },

                saveHistory() {
                    const text = document.getElementById('history-text').innerText;
                    db.collection('villages').doc(this.villageId).update({
                        history: text
                    }).then(() => alert("Літопис оновлено успішно!"));
                },

                initDragScroll() {
                    const containers = document.querySelectorAll('.hide-scrollbar');
                    containers.forEach(slider => {
                        let isDown = false, startX, scrollLeft;
                        slider.addEventListener('mousedown', e => {
                            isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
                        });
                        slider.addEventListener('mouseup', () => isDown = false);
                        slider.addEventListener('mousemove', e => {
                            if(!isDown) return;
                            e.preventDefault();
                            const x = e.pageX - slider.offsetLeft;
                            const walk = (x - startX) * 2;
                            slider.scrollLeft = scrollLeft - walk;
                        });
                    });
                }
            }
        }

        // 3. GSAP Parallax
        gsap.registerPlugin(ScrollTrigger);
        gsap.to('.parallax-bg', {
            scrollTrigger: { trigger: 'body', start: 'top top', scrub: true },
            y: 200
        });
    </script>
</body>
</html>
