<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Село — Спадщина Полісся</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Firebase & Swiper -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body { background-color: #061A12; color: #1B1411; overflow-x: hidden; }
        
        /* Текстура старого паперу */
        .parchment {
            background: #e6d5b8 url('https://www.transparenttextures.com/patterns/parchment.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2), 0 50px 100px rgba(0,0,0,0.5);
            min-height: 100vh;
            border-radius: 2rem 2rem 0 0;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .village-title { font-family: 'Great Vibes', cursive; color: #2D1B0D; }
        .handwritten { font-family: 'Cormorant Garamond', serif; font-style: italic; }

        /* Стилізація інтерактивних предметів (Кнопки-об'єкти) */
        .item-btn {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }
        .item-btn:hover { transform: scale(1.1) rotate(2deg); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); }
        .item-btn:active { transform: scale(0.95); }

        /* Спеціальний шрифт для підписів об'єктів */
        .item-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #4A3728;
            opacity: 0.7;
        }

        /* Модальні вікна секцій */
        .section-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(6, 26, 18, 0.98);
            backdrop-filter: blur(20px);
            display: none;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .section-overlay.active { display: block; }

        .close-btn { position: fixed; top: 30px; right: 30px; z-index: 110; color: #D4A017; font-size: 3rem; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="villageApp()">

    <!-- 1. ВЕРХНЯ ЧАСТИНА (ФОТО БУДИНКУ) -->
    <section class="h-[60vh] relative overflow-hidden">
        <img :src="village.img" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-[#e6d5b8] via-transparent to-transparent"></div>
        <a href="index.html" class="absolute top-8 left-8 bg-white/20 backdrop-blur-md p-3 rounded-full text-white hover:bg-white/40 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"/></svg>
        </a>
    </section>

    <!-- 2. ПЕРГАМЕНТНА ЧАСТИНА -->
    <main class="parchment px-6 pb-20">
        <div class="max-w-4xl mx-auto text-center pt-16">
            <h1 class="text-7xl md:text-9xl village-title mb-4" x-text="village.name"></h1>
            <div class="flex items-center justify-center gap-4 mb-12">
                <div class="h-[1px] w-12 bg-[#4A3728]/30"></div>
                <p class="handwritten text-xl md:text-2xl text-[#4A3728]" x-text="village.sub"></p>
                <div class="h-[1px] w-12 bg-[#4A3728]/30"></div>
            </div>

            <!-- ІНТЕРАКТИВНА ЗОНА (КНОПКИ-ОБ'ЄКТИ) -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-12 mt-20 relative px-4">
                
                <!-- Історія (Книга) -->
                <div class="relative group item-btn" @click="activeTab = 'history'">
                    <img src="https://img.icons8.com/plasticine/200/book.png" class="mx-auto w-32 md:w-40">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-serif font-bold text-xs text-white uppercase opacity-80 pointer-events-none">Історія</span>
                    <p class="item-label">Тисніть на книгу</p>
                </div>

                <!-- Фото (Стопка фото) -->
                <div class="relative group item-btn" @click="activeTab = 'gallery'">
                    <img src="https://img.icons8.com/plasticine/200/stack-of-photos.png" class="mx-auto w-32 md:w-40">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-serif font-bold text-xs text-white uppercase opacity-80 pointer-events-none">Фото</span>
                    <p class="item-label">Галерея</p>
                </div>

                <!-- Архів (Портфель) -->
                <div class="relative group item-btn" @click="activeTab = 'archives'">
                    <img src="https://img.icons8.com/plasticine/200/briefcase.png" class="mx-auto w-32 md:w-40">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-serif font-bold text-xs text-white uppercase opacity-80 pointer-events-none">Архів</span>
                    <p class="item-label">Тисніть на портфель</p>
                </div>

                <!-- Відео (Плівка) -->
                <div class="relative group item-btn" @click="activeTab = 'video'">
                    <img src="https://img.icons8.com/plasticine/200/movie-projector.png" class="mx-auto w-32 md:w-40">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-serif font-bold text-xs text-white uppercase opacity-80 pointer-events-none">Відео</span>
                    <p class="item-label">Відео-хроніка</p>
                </div>

                <!-- 3D Кімната (Глобус/Магія) -->
                <div class="relative group item-btn mt-10 md:col-start-2 col-span-2" @click="activeTab = 'vr'">
                    <img src="https://img.icons8.com/plasticine/200/globe.png" class="mx-auto w-24">
                    <p class="item-label">3D Панорами 360°</p>
                </div>
            </div>
        </div>
    </main>

    <!-- СЕКЦІЇ (MODALS) -->
    
    <!-- 1. Історія -->
    <div class="section-overlay" :class="activeTab === 'history' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-4xl mx-auto mt-20">
            <h2 class="text-6xl font-serif text-[#D4A017] mb-12 text-center italic">Літопис села</h2>
            <div class="bg-white/5 p-10 rounded-[3rem] text-xl text-gray-300 leading-relaxed font-light first-letter:text-6xl first-letter:text-gold-accent" x-text="village.history"></div>
        </div>
    </div>

    <!-- 2. Галерея -->
    <div class="section-overlay" :class="activeTab === 'gallery' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-6xl mx-auto mt-20">
            <h2 class="text-5xl font-serif text-[#D4A017] mb-16 text-center">Світлини Пам'яті</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="p in photos">
                    <div class="aspect-[4/5] rounded-3xl overflow-hidden border border-white/10 group">
                        <img :src="p.url" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- 3. Відео -->
    <div class="section-overlay" :class="activeTab === 'video' ? 'active' : ''">
        <button class="close-btn" @click="activeTab = ''">&times;</button>
        <div class="max-w-6xl mx-auto mt-20 text-center">
            <h2 class="text-5xl font-serif text-[#D4A017] mb-16">Відео-архів</h2>
            <div class="grid md:grid-cols-2 gap-10">
                <template x-for="v in videos">
                    <div class="rounded-[2.5rem] overflow-hidden border border-white/10 aspect-video">
                        <iframe class="w-full h-full" :src="'https://www.youtube.com/embed/' + v.ytId" frameborder="0" allowfullscreen></iframe>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const VILLAGE_DATA = {
            'prybytky': { name: 'Прибитки', sub: 'Фото. Відео. Історія. Архівні документи.', img: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1200', history: 'Прибитки — це місце сили, де кожен камінь дихає історією. Засноване у XV столітті, село пережило віки, зберігши свою душу...' },
            'sorokopen': { name: 'Сорокопень', sub: 'Край Кряжу та Пірофіліту', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1200', history: 'Сорокопень гордо стоїть на вершині Словечансько-Овруцького кряжу...' },
            'stari': { name: 'Старі Велідники', sub: 'Шляхетська Слава Полісся', img: 'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?q=80&w=1200', history: 'Старі Велідники — одне з найстаріших поселень краю...' },
            'novi': { name: 'Нові Велідники', sub: 'Молоде Серце Громади', img: 'https://images.unsplash.com/photo-1414438992182-69e404046f80?q=80&w=1200', history: 'Нові Велідники — це майбутнє, яке будується на міцному фундаменті минулого...' }
        };

        function villageApp() {
            return {
                villageId: new URLSearchParams(window.location.search).get('v') || 'prybytky',
                village: {},
                activeTab: '',
                photos: [],
                videos: [],

                init() {
                    this.village = VILLAGE_DATA[this.villageId] || VILLAGE_DATA['prybytky'];
                    
                    // Завантаження фото села з бази
                    db.collection('village_photos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.photos = s.docs.map(d => d.data());
                    });

                    // Завантаження відео села з бази
                    db.collection('village_videos').where('village', '==', this.villageId).onSnapshot(s => {
                        this.videos = s.docs.map(d => d.data());
                    });
                }
            }
        }

        // Плавна поява предметів
        window.addEventListener('load', () => {
            gsap.from(".item-btn", { 
                y: 100, opacity: 0, duration: 1, stagger: 0.2, ease: "power4.out" 
            });
        });
    </script>
</body>
</html>
