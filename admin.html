<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>⚙️ Керування Громадою | Моє Село</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#061A12] text-[#F5EED8] font-['Plus_Jakarta_Sans']">

    <!-- Screen: Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#061A12] to-[#0A2F1F]">
        <div class="bg-white/5 border border-white/10 p-12 rounded-[3rem] backdrop-blur-xl text-center max-w-md w-full">
            <div class="text-6xl mb-6">🌲</div>
            <h1 class="text-4xl font-['Cormorant_Garamond'] font-bold text-[#D4A017] mb-4">Адмін-панель</h1>
            <p class="text-gray-400 mb-10 text-sm">Вхід тільки для адміністратора громади</p>
            <button onclick="login()" class="w-full bg-[#D4A017] text-[#061A12] py-4 rounded-full font-extrabold uppercase tracking-widest hover:scale-105 transition-all">Увійти через Google</button>
        </div>
    </div>

    <!-- Screen: Admin Panel -->
    <div id="admin-panel" class="hidden min-h-screen pb-20">
        <header class="bg-black/30 border-b border-white/5 px-8 py-4 flex justify-between items-center sticky top-0 backdrop-blur-md z-50">
            <div class="font-['Cormorant_Garamond'] text-2xl font-bold text-[#D4A017]">⚙️ МОЄ СЕЛО / CONTROL</div>
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-[10px] font-bold opacity-50 uppercase tracking-widest"></span>
                <button onclick="logout()" class="text-red-400 text-xs border border-red-400/30 px-4 py-1 rounded-full hover:bg-red-400 hover:text-white transition-all">Вийти</button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto mt-12 px-6">
            <!-- TAB: Announcements -->
            <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-10 mb-8">
                <h2 class="text-2xl font-['Cormorant_Garamond'] font-bold text-[#D4A017] mb-8">📢 Додати термінове оголошення</h2>
                <div class="space-y-4">
                    <input id="ann-title" type="text" placeholder="Заголовок (наприклад: Субботник)" class="w-full bg-black/20 border border-white/10 rounded-2xl px-6 py-3 outline-none focus:border-[#D4A017]">
                    <textarea id="ann-text" placeholder="Текст оголошення..." class="w-full bg-black/20 border border-white/10 rounded-2xl px-6 py-3 h-32 outline-none focus:border-[#D4A017]"></textarea>
                    <button onclick="saveAnn()" class="bg-[#D4A017] text-[#061A12] px-8 py-3 rounded-full font-bold uppercase text-xs">Опублікувати на головній</button>
                </div>
            </div>

            <!-- List of existing -->
            <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-10">
                <h2 class="text-2xl font-['Cormorant_Garamond'] font-bold text-[#D4A017] mb-8">📋 Активні оголошення</h2>
                <div id="ann-list" class="space-y-4">
                    <!-- Dynamic items -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = 'restend88@gmail.com';

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('user-email').textContent = user.email;
                loadAnnouncements();
            } else if (user) {
                alert('Ви не маєте прав доступу!');
                auth.signOut();
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut().then(() => location.reload()); }

        async function saveAnn() {
            const title = document.getElementById('ann-title').value;
            const text = document.getElementById('ann-text').value;
            if(!title || !text) return alert('Заповніть поля!');

            await db.collection('announcements').add({
                title, text, ts: firebase.firestore.FieldValue.serverTimestamp(), pin: true
            });
            document.getElementById('ann-title').value = '';
            document.getElementById('ann-text').value = '';
        }

        function loadAnnouncements() {
            db.collection('announcements').orderBy('ts', 'desc').onSnapshot(snap => {
                const container = document.getElementById('ann-list');
                container.innerHTML = snap.docs.map(doc => `
                    <div class="bg-black/20 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div>
                            <p class="font-bold text-sm text-[#D4A017]">${doc.data().title}</p>
                            <p class="text-xs text-gray-400">${doc.data().text}</p>
                        </div>
                        <button onclick="deleteAnn('${doc.id}')" class="text-red-500 text-xs">Видалити</button>
                    </div>
                `).join('');
            });
        }

        async function deleteAnn(id) {
            if(confirm('Видалити?')) await db.collection('announcements').doc(id).delete();
        }
    </script>
</body>
</html>
