    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #D4A017; --dark: #061A12; }
        body { background-color: var(--dark); color: #F5EED8; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); transform: scale(1.05); font-weight: 800; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, textarea, select { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(212, 160, 23, 0.2); }
        
        .btn-save { background: var(--gold); color: var(--dark); font-weight: 800; transition: all 0.3s; }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .item-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .item-card:hover { border-color: rgba(212, 160, 23, 0.3); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>

        </header>
