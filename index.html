<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє Село — Громада Полісся | Медіа-Портал</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Swiper.js (for ColorWay Slider) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'forest-dark': '#0A2F1F', 'forest-deep': '#061A12', 'gold-accent': '#D4A017', 'gold-bright': '#E8B923' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #061A12; color: #E2E8F0; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(17, 45, 34, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(212, 160, 23, 0.1); }
        
        /* Swiper Customization */
        .swiper-button-next, .swiper-button-prev { color: #D4A017 !important; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(212, 160, 23, 0.3); backdrop-filter: blur(10px); }
        .swiper-button-next:after, .swiper-button-prev:after { font-size: 20px !important; font-weight: bold; }
        
        /* Video Card Reels Style */
        .video-card { aspect-ratio: 9/16; border-radius: 1.5rem; overflow: hidden; position: relative; cursor: pointer; transition: 0.4s; }
        .video-card:hover { transform: translateY(-10px); }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; display: flex; items-center; justify-center; opacity: 0; transition: 0.3s; }
        .video-card:hover .play-btn { opacity: 1; }

        .ann-marquee { animation: scroll-left 35s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="mainApp">

    <!-- Modal for Video Player -->
    <div x-show="openVideo" x-cloak class="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl">
        <button @click="openVideo = false" class="absolute top-10 right-10 text-white text-4xl">&times;</button>
        <div class="w-full max-w-5xl aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl">
            <iframe id="modal-iframe" class="w-full h-full" :src="videoUrl" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Announcement Bar -->
    <div x-show="announcements.length" class="fixed top-0 w-full z-[110] bg-gold-accent text-forest-deep py-2 overflow-hidden border-b border-black/10">
        <div class="flex whitespace-nowrap gap-20 ann-marquee font-black uppercase text-[10px]">
            <template x-for="ann in announcements">
                <span>📢 <span x-text="ann.title"></span>: <span x-text="ann.text" class="font-bold opacity-80"></span></span>
            </template>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] px-6 py-12 transition-all duration-500" id="main-nav">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-card px-8 py-3 rounded-full">
            <div class="flex items-center gap-3 cursor-pointer" @click="location.reload()">
                <div class="w-10 h-10 bg-gold-accent rounded-full flex items-center justify-center font-extrabold text-forest-deep">МС</div>
                <span class="text-xl font-serif font-bold text-gold-accent uppercase">Моє Село</span>
            </div>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#vr-tour" class="hover:text-gold-accent">3D Тур</a>
                <a href="#gallery" class="hover:text-gold-accent">Галерея</a>
                <a href="#videos" class="hover:text-gold-accent">Відео</a>
                <a x-show="isAdmin" href="admin.html" class="text-red-400">⚙️ Панель</a>
            </div>
            <button @click="user ? logout() : login()" class="bg-gold-accent text-forest-deep px-6 py-2 rounded-full font-bold text-[10px] uppercase">
                <span x-text="user ? 'Вийти' : 'Увійти'"></span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-forest-deep"></div>
        <div class="text-center z-10 px-4">
            <h1 class="text-7xl md:text-[140px] font-serif font-bold text-white leading-none tracking-tighter">Спадщина <br> <span class="text-gold-accent italic">Предків</span></h1>
        </div>
    </section>

    <!-- NEW: VIDEO SLIDER (COLORWAY STYLE) -->
    <section id="videos" class="py-32 bg-forest-deep">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-16">
                <h2 class="text-4xl md:text-5xl font-serif text-white mb-4">Життя Громади</h2>
                <div class="w-20 h-1 bg-gold-accent mx-auto"></div>
            </div>

            <div class="relative group">
                <div class="swiper videoSwiper">
                    <div class="swiper-wrapper">
                        <template x-for="v in videos">
                            <div class="swiper-slide">
                                <div class="video-card glass-card p-1" @click="playVideo(v.ytId)">
                                    <img :src="'https://img.youtube.com/vi/' + v.ytId + '/maxresdefault.jpg'" class="w-full h-full object-cover rounded-3xl">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                    <div class="play-btn">
                                        <svg class="w-8 h-8 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 3.5v13l13-6.5-13-6.5z"/></svg>
                                    </div>
                                    <div class="absolute bottom-6 left-6 right-6">
                                        <p class="text-[9px] font-bold text-gold-accent uppercase mb-1" x-text="v.village"></p>
                                        <h4 class="text-sm font-bold text-white leading-tight" x-text="v.title"></h4>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- Navigation Arrows -->
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>
    </section>

    <!-- PHOTO GALLERY WITH FILTERS -->
    <section id="gallery" class="py-32 bg-forest-dark" x-data="{ activeFilter: 'all' }">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-serif text-white text-center mb-16">Світлини Пам'яті</h2>
            
            <!-- Filters -->
            <div class="flex flex-wrap justify-center gap-3 mb-16">
                <button @click="activeFilter = 'all'" :class="activeFilter === 'all' ? 'bg-gold-accent text-forest-deep' : 'border border-white/10'" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase transition-all">Усі фото</button>
                <button @click="activeFilter = 'prybytky'" :class="activeFilter === 'prybytky' ? 'bg-gold-accent text-forest-deep' : 'border border-white/10'" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase transition-all">Прибитки</button>
                <button @click="activeFilter = 'sorokopen'" :class="activeFilter === 'sorokopen' ? 'bg-gold-accent text-forest-deep' : 'border border-white/10'" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase transition-all">Сорокопень</button>
                <button @click="activeFilter = 'stari'" :class="activeFilter === 'stari' ? 'bg-gold-accent text-forest-deep' : 'border border-white/10'" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase transition-all">Ст. Велідники</button>
                <button @click="activeFilter = 'novi'" :class="activeFilter === 'novi' ? 'bg-gold-accent text-forest-deep' : 'border border-white/10'" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase transition-all">Н. Велідники</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <template x-for="p in photos">
                    <div x-show="activeFilter === 'all' || activeFilter === p.village" 
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 scale-90"
                         class="aspect-square overflow-hidden rounded-3xl border border-white/5 relative group cursor-pointer">
                        <img :src="p.url" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                            <p class="text-[9px] font-bold text-gold-accent uppercase" x-text="p.caption"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- 3D VR TOUR -->
    <section id="vr-tour" class="py-32 bg-forest-deep" x-show="panoramas.length">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-12">
                <h2 class="text-4xl font-serif text-white">Віртуальний тур</h2>
                <div class="flex flex-wrap gap-4 mt-8">
                    <template x-for="pano in panoramas">
                        <button @click="loadPano(pano.url)" class="px-8 py-3 rounded-full border border-white/10 text-[11px] font-bold uppercase hover:bg-gold-accent hover:text-forest-deep transition-all" x-text="pano.name"></button>
                    </template>
                </div>
            </div>
            <div class="glass-card p-3 rounded-[3rem]">
                <canvas id="pano-canvas"></canvas>
            </div>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        document.addEventListener('alpine:init', () => {
            Alpine.data('mainApp', () => ({
                user: null, isAdmin: false, announcements: [], photos: [], videos: [], panoramas: [],
                openVideo: false, videoUrl: '',
                
                init() {
                    auth.onAuthStateChanged(u => {
                        this.user = u;
                        this.isAdmin = u && u.email === 'restend88@gmail.com';
                    });
                    
                    db.collection('announcements').orderBy('ts', 'desc').onSnapshot(s => this.announcements = s.docs.map(d => d.data()));
                    db.collection('village_photos').orderBy('ts', 'desc').onSnapshot(s => this.photos = s.docs.map(d => d.data()));
                    db.collection('panoramas').orderBy('ts', 'desc').onSnapshot(s => {
                        this.panoramas = s.docs.map(d => d.data());
                        if(this.panoramas.length && !window.panoLoaded) {
                            setTimeout(() => this.loadPano(this.panoramas[0].url), 1000);
                            window.panoLoaded = true;
                        }
                    });

                    db.collection('village_videos').orderBy('ts', 'desc').onSnapshot(s => {
                        this.videos = s.docs.map(d => d.data());
                        this.$nextTick(() => { this.initSwiper(); });
                    });
                },

                login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                logout() { auth.signOut().then(() => location.reload()); },
                
                playVideo(id) {
                    this.videoUrl = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
                    this.openVideo = true;
                },

                initSwiper() {
                    new Swiper(".videoSwiper", {
                        slidesPerView: 1.5,
                        spaceBetween: 20,
                        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                        breakpoints: {
                            640: { slidesPerView: 2.5 },
                            1024: { slidesPerView: 4.5 }
                        }
                    });
                },

                loadPano(url) { if (window.updatePanoTexture) window.updatePanoTexture(url); }
            }));
        });

        // Three.js 3D Pano
        let scene, camera, renderer, sphere;
        function initPano() {
            const canvas = document.getElementById('pano-canvas');
            if(!canvas) return;
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / 500, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, 500);
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1);
            sphere = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x111111 }));
            scene.add(sphere);
            window.updatePanoTexture = (url) => {
                new THREE.TextureLoader().load(url, (texture) => { sphere.material.map = texture; sphere.material.needsUpdate = true; });
            };
            camera.position.set(0, 0, 0.1);
            let lon = 0, lat = 0, isUserInteracting = false, onPointerDownPointerX = 0, onPointerDownPointerY = 0, onPointerDownLon = 0, onPointerDownLat = 0;
            canvas.addEventListener('mousedown', (e) => { isUserInteracting = true; onPointerDownPointerX = e.clientX; onPointerDownPointerY = e.clientY; onPointerDownLon = lon; onPointerDownLat = lat; });
            document.addEventListener('mousemove', (e) => { if (isUserInteracting) { lon = (onPointerDownPointerX - e.clientX) * 0.1 + onPointerDownLon; lat = (e.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat; } });
            document.addEventListener('mouseup', () => { isUserInteracting = false; });
            function animate() { requestAnimationFrame(animate); lat = Math.max(-85, Math.min(85, lat)); const phi = THREE.MathUtils.degToRad(90 - lat); const theta = THREE.MathUtils.degToRad(lon); camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta)); renderer.render(scene, camera); }
            animate();
        }

        window.addEventListener('load', () => {
            gsap.to('.parallax-bg', { scrollTrigger: { trigger: 'body', start: 'top top', scrub: true }, y: 200 });
            initPano();
        });
    </script>
</body>
</html>
