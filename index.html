<!-- index.html -->
<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє Село — Громада Полісся</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #061A12; color: #E2E8F0; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(17, 45, 34, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(212, 160, 23, 0.1); }
        .village-card { perspective: 1200px; }
        .card-inner { transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); transform-style: preserve-3d; border-radius: 2.5rem; }
        .village-card:hover .card-inner { transform: translateY(-15px) rotateX(4deg) rotateY(2deg); border-color: #D4A017; box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8); }
        .village-card:active .card-inner { transform: scale(0.94); transition: all 0.1s; }
        .card-img-wrap { overflow: hidden; border-radius: 2rem; }
        .card-img-wrap img { transition: transform 1s; }
        .village-card:hover .card-img-wrap img { transform: scale(1.2); }
        .ann-marquee { animation: scroll-left 30s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body x-data="mainApp">

    <!-- Announcements -->
    <div x-show="announcements.length" class="fixed top-0 w-full z-[110] bg-[#D4A017] text-[#061A12] py-2 overflow-hidden font-bold uppercase tracking-widest text-[10px]">
        <div class="flex whitespace-nowrap gap-20 ann-marquee">
            <template x-for="ann in announcements">
                <span>📢 <span x-text="ann.title"></span>: <span x-text="ann.text" class="font-normal"></span></span>
            </template>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] px-6 py-10 transition-all duration-500">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-card px-8 py-3 rounded-full">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-[#D4A017] rounded-full flex items-center justify-center font-extrabold text-[#061A12]">МС</div>
                <span class="text-xl font-serif font-bold text-[#D4A017] uppercase tracking-tighter">Моє Село</span>
            </div>
            
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#villages" class="hover:text-[#D4A017]">Громада</a>
                <a href="#events" class="hover:text-[#D4A017]">Події</a>
                <a href="#chat" class="hover:text-[#D4A017]">Чат</a>
                <a x-show="isAdmin" href="admin.html" class="text-red-400 animate-pulse">⚙️ Панель</a>
            </div>

            <div class="flex items-center gap-4">
                <template x-if="!user">
                    <button @click="login()" class="bg-[#D4A017] text-[#061A12] px-6 py-2 rounded-full font-bold text-[10px] uppercase">Увійти</button>
                </template>
                <template x-if="user">
                    <img :src="user.photoURL" @click="auth.signOut()" class="w-10 h-10 rounded-full border-2 border-[#D4A017] cursor-pointer">
                </template>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-30">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" class="w-full h-full object-cover scale-110 parallax-bg">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#061A12]/80 to-[#061A12]"></div>
        </div>
        <div class="text-center z-10">
            <h2 class="text-[#D4A017] font-serif italic text-3xl mb-4 hero-fade opacity-0">Поліська Спадщина</h2>
            <h1 class="text-7xl md:text-[150px] font-serif font-bold text-white leading-none hero-fade opacity-0 tracking-tighter">Спадщина <br> <span class="text-[#D4A017] italic">Предків</span></h1>
        </div>
    </section>

    <!-- Villages -->
    <section id="villages" class="py-40 bg-[#0A2F1F]">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 lg:grid-cols-4 gap-10">
            <template x-for="v in villages">
                <a :href="'village.html?v=' + v.id" class="village-card group block h-[550px]">
                    <div class="card-inner glass-card p-3 h-full flex flex-col transition-all">
                        <div class="card-img-wrap h-2/3">
                            <img :src="v.img" class="w-full h-full object-cover rounded-[1.5rem]">
                        </div>
                        <div class="p-6">
                            <h3 class="text-3xl font-serif text-white mb-2" x-text="v.name"></h3>
                            <p class="text-[11px] text-gray-400" x-text="v.desc"></p>
                        </div>
                    </div>
                </a>
            </template>
        </div>
    </section>

    <!-- Events Section -->
    <section id="events" class="py-32 bg-[#061A12]">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-5xl font-serif mb-16 text-[#D4A017] text-center italic">Календар громади</h2>
            <div class="space-y-6">
                <template x-for="ev in events">
                    <div class="glass-card p-6 rounded-[2rem] flex items-center gap-8">
                        <div class="bg-[#D4A017]/10 p-4 rounded-2xl text-center min-w-[80px]">
                            <span class="block text-3xl font-bold text-[#D4A017]" x-text="ev.day"></span>
                            <span class="text-[10px] uppercase font-black text-gray-500" x-text="ev.month"></span>
                        </div>
                        <div>
                            <h4 class="text-xl font-bold text-white" x-text="ev.title"></h4>
                            <p class="text-sm text-gray-400" x-text="ev.desc"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRJzUm5zYrsXLSGA7iGGoBZ6bblHnTONs",
            authDomain: "moe-selo-76a49.firebaseapp.com",
            projectId: "moe-selo-76a49",
            storageBucket: "moe-selo-76a49.firebasestorage.app",
            messagingSenderId: "446551102286",
            appId: "1:446551102286:web:08ec3b9a8b3c966dcc441f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.addEventListener('alpine:init', () => {
            Alpine.data('mainApp', () => ({
                user: null, isAdmin: false, announcements: [], events: [],
                villages: [
                    {id:'prybytky', name:'Прибитки', desc:'Затишне поліське село.', img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=600'},
                    {id:'sorokopen', name:'Сорокопень', desc:'Геологічний центр кряжу.', img:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600'},
                    {id:'stari', name:'Старі Велідники', desc:'Хранителі прадавньої історії.', img:'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?q=80&w=600'},
                    {id:'novi', name:'Нові Велідники', desc:'Молода енергія громади.', img:'https://images.unsplash.com/photo-1414438992182-69e404046f80?q=80&w=600'}
                ],
                init() {
                    auth.onAuthStateChanged(u => {
                        this.user = u;
                        this.isAdmin = u && u.email === 'restend88@gmail.com';
                    });
                    db.collection('announcements').orderBy('ts', 'desc').onSnapshot(s => this.announcements = s.docs.map(d => d.data()));
                    db.collection('events').orderBy('date', 'asc').onSnapshot(s => this.events = s.docs.map(d => d.data()));
                },
                login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
            }));
        });

        gsap.registerPlugin(ScrollTrigger);
        window.addEventListener('load', () => {
            gsap.to('.hero-fade', { opacity: 1, y: 0, duration: 1.5, stagger: 0.4 });
            gsap.to('.parallax-bg', { scrollTrigger: { trigger: 'body', start: 'top top', end: 'bottom top', scrub: true }, y: 200 });
        });
    </script>
</body>
</html>
